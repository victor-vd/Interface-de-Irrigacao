<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Style/style.css">
    <title>PainelPrincipal</title>
</head>
<body>
    <nav class="navbar"></nav>
    <div class="imagem grande">
        <img src="../Assets/Imagens/LogoIrrigacao (128x128).png" alt="">
    </div>

    <div class="titulo">
        <span>
            Painel Principal
        </span>
    </div>
    <div class="botoesPainel">
        <div class="botoesColuna1">
            <div name="CicloDiario">
                <button id="botaoCicloDiario" class="botaoPainel">
                    <img src="../Assets/Imagens/routine_white (64x64).png" alt="">
                    <span>
                        Ativar o<br>Ciclo Diário
                    </span>    
                </button>
                <div id="janelaCicloDiario" class="popup">
                    <div class="content">
                        <h1 class="tituloJanela">
                            Ativar o Ciclo Diário
                        </h1>
                        <div class="subtitulo">
                            texto
                        </div>
                        <button id="fecharCicloDiario" class="botao">
                            <span>
                                Voltar
                            </span>
                        </button>
                    </div>
                </div>
            </div>
            <div name="AspersorIndiv">
                <button id="botaoAspersorIndiv" class="botaoPainel">
                    <img src="../Assets/Imagens/sprinkler_white (64x64).png" alt="">
                    <span>
                        Ativar Aspersor<br>Individual
                    </span>    
                </button>
                <div id="janelaAspersorIndiv" class="popup">
                    <div class="content">
                        <h1 class="tituloJanela">
                            Ativar Aspersor Individual
                        </h1>
                        <div class="subtitulo">
                            bsethe
                        </div>
                        <button id="fecharAspersorIndiv" class="botao">
                            <span>
                                Voltar
                            </span>
                        </button>
                    </div>
                </div>
            </div>
            <button id="Desativa" class="botaoPainel botaoZ" href="">
                <img src="../Assets/Imagens/Unavailable (64x64).png" alt="">
                <span>
                    Encerrar<br>Atividades
                </span>    
            </button>
        </div>
        <div class="botoesColuna2">
            <div name="RotinaTeste">
                <button id="botaoRotinaTeste" class="botaoPainel">
                    <img src="../Assets/Imagens/search_white (64x64).png" alt="">
                    <span>
                        Executar Rotina<br>de Teste
                    </span>    
                </button>
                <div id="janelaRotinaTeste" class="popup">
                    <div class="content">
                        <h1 class="tituloJanela">
                            Executar Rotina de Teste
                        </h1>
                        <div class="subtitulo">
                            texto
                        </div>
                        <button id="fecharRotinaTeste" class="botao">
                            <span>
                                Voltar
                            </span>
                        </button>
                    </div>
                </div>
            </div>
            <div name="LigaTorneira">
                <button id="botaoLigaTorneira" class="botaoPainel">
                    <img src="../Assets/Imagens/water-faucet_white (64x64).png" alt="">
                    <span>
                        Ligar<br>Torneiras
                    </span>    
                </button>
                <div id="janelaLigaTorneira" class="popup">
                    <div class="content">
                        <h1 class="tituloJanela">
                            Ligar Torneiras
                        </h1>
                        <div class="subtitulo">
                            texto
                        </div>
                        <button id="fecharLigaTorneira" class="botao">
                            <span>
                                Voltar
                            </span>
                        </button>
                    </div>
                </div>
            </div>
            <div name="InfoSistema">
                <button id="botaoInfoSistema" class="botaoPainel">
                    <img src="../Assets/Imagens/information_white (64x64).png" alt="">
                    <span>
                        Informações<br>do Sistema
                    </span>    
                </button>
                <div id="janelaInfoSistema" class="popup">
                    <div class="content">
                        <h1 class="tituloJanela">
                            Informações do Sistema
                        </h1>
                        <div class="subtitulo">
                            texto
                        </div>
                        <button id="fecharInfoSistema" class="botao">
                            <span>
                                Voltar
                            </span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div name="Configuracoes" class="botaoFlutuante">
        <a id="botaoConfiguracoes">
            <img src="../Assets/Imagens/Settings.png" alt="">
        </a>
        <div id="janelaConfiguracoes" class="popup">
            <div class="content">
                <h1 class="tituloJanela">
                    Configuracoes
                </h1>
                <div class="subtitulo">
                    texto
                </div>
                <button id="fecharConfiguracoes" class="botao">
                    <span>
                        Voltar
                    </span>
                </button>
            </div>
        </div>
    </div>
    </div>

<script src="../Scripts/inject.js"></script>
<script src="../Scripts/window.js"></script>
</body>
</html>
